components:
  schemas:
    Booking:
      type: object
      required:
        - id
        - idempotency_key
        - created_at
        - client_id
        - slot_id
        - status
        - seats_count
        - fixed_base_price
        - needs_rental_equipment
        - equipment_tariff
      properties:
        id:
          $ref: '../common/models.yaml#/components/schemas/UUID'
        idempotency_key:
          type: string
          description: Ключ идемпотентности, переданный при создании брони.
        created_at:
          $ref: '../common/models.yaml#/components/schemas/Timestamp'
        client_id:
          $ref: '../common/models.yaml#/components/schemas/UUID'
        slot_id:
          $ref: '../common/models.yaml#/components/schemas/UUID'
        status:
          type: string
          enum: [PENDING_PAYMENT, ACTIVE, CANCELLED_BY_CLIENT, CANCELLED_BY_STUDIO, COMPLETED]
          description: Текущий статус бронирования.
        seats_count:
          type: integer
          description: Количество забронированных мест.
        expires_at:
          $ref: '../common/models.yaml#/components/schemas/Timestamp'
          description: Время истечения брони (для PENDING_PAYMENT).
        fixed_base_price:
          type: integer
          description: Замороженная базовая стоимость участия на момент бронирования.
        needs_rental_equipment:
          type: boolean
          description: Признак аренды экипировки.
        equipment_tariff:
          type: integer
          description: Замороженная стоимость аренды инвентаря на момент бронирования.
        chef_rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Оценка, выставленная шефу.

    CreateBookingRequest:
      type: object
      required:
        - slot_id
        - seats_count
      properties:
        slot_id:
          $ref: '../common/models.yaml#/components/schemas/UUID'
        seats_count:
          type: integer
          minimum: 1
          maximum: 3
          description: Количество бронируемых мест.
        needs_rental_equipment:
          type: boolean
          description: Признак необходимости аренды экипировки.

    RateChefRequest:
      type: object
      required:
        - rating
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Оценка шефу.

    CreateBookingResponse:
      type: object
      required:
        - id
        - expires_at
      properties:
        id:
          $ref: '../common/models.yaml#/components/schemas/UUID'
        expires_at:
          $ref: '../common/models.yaml#/components/schemas/Timestamp'
